<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beautiful Birthday Surprise</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        
        body {
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient( to bottom, #07072f, #1a0033, #3b004d, #5a0066);
            color: white;
        }
        /* HEARTS */
        
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            bottom: -50px;
            animation: fly linear infinite;
        }
        
        @keyframes fly {
            0% {
                transform: translateY(0) scale(0.7);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
        /* HERO */
        
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        /* GLOW */
        
        .glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient( rgba(255, 0, 150, 0.35), transparent);
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse 5s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        /* TITLE */
        
        .title {
            position: relative;
            z-index: 5;
            font-size: 6rem;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 20px #ff4da6, 0 0 50px #ff4da6;
            min-height: 140px;
        }
        /* SUBTITLE */
        
        .subtitle {
            position: relative;
            z-index: 5;
            margin-top: 20px;
            font-size: 1.4rem;
            color: #ffd6f0;
        }
        /* BUTTON */
        
        .next-btn {
            position: relative;
            z-index: 5;
            margin-top: 40px;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff1493;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        
        .next-btn:hover {
            transform: scale(1.1);
            background: #ffd6f0;
        }
        /* SECTION */
        
        .section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px 20px;
            position: relative;
            z-index: 5;
        }
        /* GLASS CARD */
        
        .card {
            width: 90%;
            max-width: 800px;
            padding: 50px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        /* CARD TITLE */
        
        .card h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
            color: #fff;
        }
        /* MESSAGE */
        
        .message {
            font-size: 1.3rem;
            line-height: 2.2;
            color: #ffe9f6;
            min-height: 250px;
        }
        /* FINAL BUTTON */
        
        .final-btn {
            margin-top: 35px;
            padding: 16px 35px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff1493;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }
        
        .final-btn:hover {
            transform: scale(1.08);
            background: #ffd6f0;
        }
        /* POPUP */
        
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 700px;
            background: white;
            color: #333;
            border-radius: 35px;
            padding: 50px;
            z-index: 100;
            transition: 0.5s;
            text-align: center;
        }
        
        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        .popup h1 {
            color: #ff1493;
            font-size: 4rem;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
        }
        
        .popup p {
            font-size: 1.2rem;
            line-height: 2;
            min-height: 250px;
        }
        /* OVERLAY */
        
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
            z-index: 50;
        }
        
        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        /* SCROLL TEXT */
        
        .scroll-text {
            margin-top: 40px;
            font-size: 1.4rem;
            color: #ffd6f0;
            animation: float 3s infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            .title {
                font-size: 3.5rem;
                min-height: 90px;
            }
            .subtitle {
                font-size: 1rem;
            }
            .card h1 {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1rem;
            }
            .popup h1 {
                font-size: 2.5rem;
            }
        }
        
        .close-btn {
            margin-top: 30px;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: #ff1493;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }
        
        .close-btn:hover {
            transform: scale(1.08);
            background: #ff4da6;
        }
    </style>
</head>

<body>

    <!-- FLOATING HEARTS -->

    <div class="hearts" id="hearts"></div>

    <!-- HERO -->

    <section class="hero">

        <div class="glow"></div>

        <div class="title" id="typing"></div>

        <div class="subtitle">

            Today is not just a day... it's your beautiful moment 💖

        </div>

        <button class="next-btn" onclick="goNextPage()">

    Enjoy The Surprise ✨

</button>

        <div class="scroll-text">

            Scroll Down ↓

        </div>

    </section>

    <!-- SECOND SECTION -->

    <section class="section" id="nextSection">

        <div class="card">

            <h1>
                A Special Wish 💕
            </h1>

            <div class="message">

                Some people enter our life and become unforgettable memories ✨

                <br><br> Your smile, your presence...

                <br><br> makes My world a more beautiful place 💖

            </div>

            <button class="final-btn" onclick="openPopup()">

            See Final Message 💌

        </button>

        </div>

    </section>

    <!-- OVERLAY -->

    <div class="overlay" id="overlay"></div>



    <!-- FINAL POPUP -->

    <div class="popup" id="popup">

        <h1>
            Happy Birthday 💖
        </h1>

        <p id="popupText"></p>

        <!-- CLOSE BUTTON -->

        <button class="close-btn" onclick="closePopup()">

        Close 💕

    </button>

    </div>

    <script>
        function goNextPage() {

            window.location.href =
                "warn.html";

        }
        /* FLOATING HEARTS */

        const heartsContainer =
            document.getElementById("hearts");

        function createHeart() {

            const heart =
                document.createElement("div");

            heart.classList.add("heart");

            const hearts = ["💖", "💕", "💗", "💘", "💞", "💓"];

            heart.innerHTML =
                hearts[Math.floor(Math.random() * hearts.length)];

            heart.style.left =
                Math.random() * 100 + "vw";

            heart.style.fontSize =
                Math.random() * 25 + 15 + "px";

            heart.style.animationDuration =
                Math.random() * 5 + 5 + "s";

            heartsContainer.appendChild(heart);

            setTimeout(() => {

                heart.remove();

            }, 10000);

        }

        setInterval(createHeart, 150);

        /* HERO TYPING */

        const text =
            "Happy Birthday My Beautiful Queen 💖";

        let i = 0;

        function typeText() {

            if (i < text.length) {

                document.getElementById("typing")
                    .innerHTML += text.charAt(i);

                i++;

                setTimeout(typeText, 150);
            }

        }

        typeText();

        /* SCROLL */

        function scrollToSection() {

            document.getElementById("nextSection")
                .scrollIntoView({
                    behavior: "smooth"
                });

        }

        /* POPUP */

        function openPopup() {

            document.getElementById("popup")
                .classList.add("show");

            document.getElementById("overlay")
                .classList.add("show");

            typePopupMessage();

        }

        /* POPUP TYPING */

        const popupMessage =
            `I love you so much MY dear Papa 💖
            You deserve An Beatiful Life filled with Happiness,
beautiful memories,
endless smiles,
and all the love in this world 💖
I Will Try to Make sure You Get all The Happiness ✨

Keep smiling,
because your smile makes My hearts happy 💕
Be with me Always My Queen 💖`;

        let j = 0;

        function typePopupMessage() {

            const popupText =
                document.getElementById("popupText");

            popupText.innerHTML = "";

            function typing() {

                if (j < popupMessage.length) {

                    popupText.innerHTML +=
                        popupMessage.charAt(j);

                    j++;

                    setTimeout(typing, 40);
                }

            }

            typing();

        }

        function closePopup() {

            document.getElementById("popup")
                .classList.remove("show");

            document.getElementById("overlay")
                .classList.remove("show");

        }
    </script>

</body>

</html>
