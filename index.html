<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #ff0080, #7928ca, #2b32ff);
            position: relative;
            color: white;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
            animation: float 6s infinite ease-in-out alternate;
        }
        
        .circle1 {
            width: 250px;
            height: 250px;
            background: #ff66c4;
            top: -50px;
            left: -50px;
        }
        
        .circle2 {
            width: 300px;
            height: 300px;
            background: #6c63ff;
            bottom: -100px;
            right: -80px;
            animation-delay: 2s;
        }
        
        @keyframes float {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(30px);
            }
        }
        
        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .countdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px 15px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .box:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .number {
            font-size: 3rem;
            font-weight: 700;
            display: block;
        }
        
        .label {
            font-size: 1rem;
            margin-top: 5px;
            opacity: 0.8;
            letter-spacing: 1px;
        }
        
        .message {
            font-size: 1.3rem;
            font-weight: 500;
            margin-top: 10px;
            color: #ffe082;
        }
        
        .btn {
            margin-top: 30px;
            display: inline-block;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            background: white;
            color: #7928ca;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.08);
            background: #ffe082;
        }
        
        .balloons span {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 80px;
            border-radius: 50%;
            animation: rise 12s linear infinite;
            opacity: 0.8;
        }
        
        .balloons span::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 60px;
            background: white;
            left: 50%;
            top: 80px;
        }
        
        .balloons span:nth-child(1) {
            left: 10%;
            background: #ff4d6d;
            animation-duration: 10s;
        }
        
        .balloons span:nth-child(2) {
            left: 30%;
            background: #ffd166;
            animation-duration: 14s;
        }
        
        .balloons span:nth-child(3) {
            left: 50%;
            background: #06d6a0;
            animation-duration: 12s;
        }
        
        .balloons span:nth-child(4) {
            left: 70%;
            background: #4cc9f0;
            animation-duration: 16s;
        }
        
        .balloons span:nth-child(5) {
            left: 90%;
            background: #c77dff;
            animation-duration: 13s;
        }
        
        @keyframes rise {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(-120vh) rotate(20deg);
            }
        }
        
        @media(max-width:768px) {
            h1 {
                font-size: 2.2rem;
            }
            .number {
                font-size: 2.3rem;
            }
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <div class="balloons">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <h1>🎂 Birthday Countdown 🎉</h1>
        <p class="subtitle">Counting down My Special Person Birthday </p>

        <div class="countdown">
            <div class="box">
                <span class="number" id="days">0</span>
                <span class="label">Days</span>
            </div>

            <div class="box">
                <span class="number" id="hours">0</span>
                <span class="label">Hours</span>
            </div>

            <div class="box">
                <span class="number" id="minutes">0</span>
                <span class="label">Minutes</span>
            </div>

            <div class="box">
                <span class="number" id="seconds">0</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div class="message" id="message">
            My special Person birthday is getting closer 🎁
        </div>

        <a href="gift.html" class="btn" onclick="sh()">Celebrate Soon ✨</a>
    </div>

    <script>
        const birthday = new Date('May 17, 2026 00:00:00').getTime();

        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = birthday - now;
            const sh = () => {
                document.getElementsByName('a').addEventListener('click', () => {})
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerHTML = days;
            document.getElementById('hours').innerHTML = hours;
            document.getElementById('minutes').innerHTML = minutes;
            document.getElementById('seconds').innerHTML = seconds;

            if (distance < 0) {
                clearInterval(countdown);
                document.querySelector('.countdown').innerHTML = `
          <div style="grid-column:1/-1;font-size:2rem;font-weight:700;">
            🎉 Happy Birthday 🎂
          </div>
        `;

                document.getElementById('message').innerHTML =
                    'Today is the special day! 🥳';
            }

        }, 1000);
    </script>

</body>

</html>
