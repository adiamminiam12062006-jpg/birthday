<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Friend Forever</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient( 135deg, #ff9ec4, #c084fc, #7c3aed);
            font-family: 'Poppins', sans-serif;
            position: relative;
        }
        /* FLOAT HEARTS */
        
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .hearts span {
            position: absolute;
            bottom: -100px;
            color: rgba(255, 255, 255, 0.7);
            animation: fly linear infinite;
        }
        
        @keyframes fly {
            0% {
                transform: translateY(0) scale(0.7);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) scale(1.5);
                opacity: 0;
            }
        }
        /* CARD */
        
        .card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            padding: 45px 30px;
            text-align: center;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            animation: pop 1s ease;
        }
        
        @keyframes pop {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        /* GIF */
        
        .gif {
            width: 180px;
            margin-bottom: 25px;
            animation: floatGif 3s infinite ease-in-out;
        }
        
        @keyframes floatGif {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        /* TITLE */
        
        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        /* QUESTION */
        
        .question {
            color: white;
            font-size: 1.2rem;
            line-height: 1.9;
            margin-bottom: 30px;
        }
        /* BUTTON */
        
        button {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #7c3aed;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.08);
            background: #ffe082;
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            h1 {
                font-size: 2.3rem;
            }
            .question {
                font-size: 1rem;
            }
            .gif {
                width: 140px;
            }
        }
    </style>
</head>

<body>

    <!-- HEARTS -->

    <div class="hearts">

        <span style="left:5%; font-size:22px; animation-duration:9s;">💖</span>

        <span style="left:18%; font-size:28px; animation-duration:11s;">💕</span>

        <span style="left:35%; font-size:20px; animation-duration:8s;">💗</span>

        <span style="left:52%; font-size:30px; animation-duration:12s;">💘</span>

        <span style="left:70%; font-size:24px; animation-duration:10s;">💞</span>

        <span style="left:88%; font-size:26px; animation-duration:9s;">💓</span>

    </div>

    <!-- CARD -->

    <div class="card">

        <!-- GIF -->

        <img src="https://media.tenor.com/dg7Th23TzFUAAAAi/teddy-bear-love.gif" class="gif">

        <!-- TITLE -->

        <h1>
            One Question 💖
        </h1>

        <!-- QUESTION -->

        <div class="question">

            Could you always be with me? ✨

        </div>

        <!-- BUTTON -->

        <button onclick="goNext()">

        Yes Forever 💕

    </button>

    </div>

    <script>
        function goNext() {

            window.location.href =
                "warn.html";

        }
    </script>

</body>

</html>
