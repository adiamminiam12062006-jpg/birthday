<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wonderful Places</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #ff0080, #7928ca, #2b32ff);
            position: relative;
            color: white;
        }
        /* BACKGROUND CIRCLES */
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
            animation: float 6s infinite ease-in-out alternate;
        }
        
        .circle1 {
            width: 250px;
            height: 250px;
            background: #ff66c4;
            top: -50px;
            left: -50px;
        }
        
        .circle2 {
            width: 300px;
            height: 300px;
            background: #6c63ff;
            bottom: -100px;
            right: -80px;
            animation-delay: 2s;
        }
        
        @keyframes float {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(30px);
            }
        }
        /* MAIN CONTAINER */
        
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }
        
        .teddy {
            width: 180px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        /* BUTTON */
        
        #openBtn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #7928ca;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        #openBtn:hover {
            transform: scale(1.08);
            background: #ffe082;
        }
        /* POPUP */
        
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 400px;
            background: white;
            color: #7928ca;
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            transition: 0.4s;
            z-index: 100;
        }
        
        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        .popup h2 {
            margin-bottom: 10px;
        }
        
        .popup p {
            margin-bottom: 20px;
        }
        
        .popup input {
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 50px;
            background: #eee;
            font-size: 1rem;
        }
        
        .popup button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: #7928ca;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .popup button:hover {
            transform: scale(1.05);
        }
        /* MESSAGE */
        
        #result {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 600;
        }
        /* OVERLAY */
        
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            top: 0;
            left: 0;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            h1 {
                font-size: 1.8rem;
            }
            .teddy {
                width: 140px;
            }
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- BACKGROUND -->

    <div class="bg-circle circle1"></div>

    <div class="bg-circle circle2"></div>

    <!-- MAIN -->

    <div class="container">

        <img src="https://media.tenor.com/dg7Th23TzFUAAAAi/teddy-bear-love.gif" class="teddy">

        <h1>
            🌍 Do You Know Wonderful Places?
        </h1>

        <p class="subtitle">
            Click OK I prove you are wonderful 💖
        </p>

        <button id="openBtn">
        OK ✨
    </button>

    </div>

    <!-- OVERLAY -->

    <div class="overlay" id="overlay"></div>

    <!-- POPUP -->

    <div class="popup" id="popup">

        <h2>
            Enter Your Name 💖
        </h2>

        <p>
            I prove you are wonderful in this world 🌍
        </p>

        <input type="text" id="nameInput" placeholder="Enter your name">

        <button id="checkBtn">
        Continue 🎀
    </button>

        <div id="result"></div>

    </div>

    <script>
        // ELEMENTS

        const openBtn =
            document.getElementById("openBtn");

        const popup =
            document.getElementById("popup");

        const overlay =
            document.getElementById("overlay");

        const checkBtn =
            document.getElementById("checkBtn");

        const result =
            document.getElementById("result");

        // OPEN POPUP

        openBtn.addEventListener("click", () => {

            popup.classList.add("show");

            overlay.classList.add("show");

        });

        // CORRECT NAME

        const correctName = "keshini";

        // CHECK NAME

        checkBtn.addEventListener("click", () => {

            const name =
                document.getElementById("nameInput")
                .value
                .trim()
                .toLowerCase();

            // EMPTY

            if (name === "") {

                result.innerHTML =
                    "⚠️ Please enter your name";

                result.style.color = "red";

            }

            // WRONG NAME
            else if (name !== correctName) {

                result.innerHTML =
                    "Its simple Think Simple";

                result.style.color =
                    "#ff4d6d";

            }

            // CORRECT NAME
            else {

                result.innerHTML =
                    "🎉 Wait We see 💖";

                result.style.color =
                    "#00ff99";

                // NEXT PAGE

                setTimeout(() => {

                    window.location.href =
                        "warn.html";

                }, 1500);

            }

        });
    </script>

</body>

</html>
