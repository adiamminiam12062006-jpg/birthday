<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danger Birthday Surprise</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            overflow: hidden;
            color: white;
        }
        
        .container {
            text-align: center;
            z-index: 2;
        }
        
        h1 {
            font-size: 4rem;
            color: red;
            text-shadow: 0 0 20px red;
            animation: blink 1s infinite;
        }
        
        p {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #ddd;
        }
        
        button {
            margin-top: 30px;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: red;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px red;
        }
        
        button:hover {
            transform: scale(1.1);
        }
        
        #warning {
            margin-top: 25px;
            font-size: 2rem;
            display: none;
            animation: flash 0.5s infinite;
        }
        
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 0, 0.2), transparent 70%);
            animation: pulse 2s infinite;
        }
        
        @keyframes blink {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }
        
        @keyframes flash {
            0% {
                color: red;
            }
            50% {
                color: white;
            }
            100% {
                color: red;
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .shake {
            animation: shake 0.2s infinite;
        }
        
        @keyframes shake {
            0% {
                transform: translate(5px, 5px);
            }
            25% {
                transform: translate(-5px, 0);
            }
            50% {
                transform: translate(5px, -5px);
            }
            75% {
                transform: translate(-5px, 5px);
            }
            100% {
                transform: translate(5px, 0);
            }
        }
        
        @media(max-width:768px) {
            h1 {
                font-size: 2.5rem;
            }
            #warning {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <div class="container">

        <h1>🚨 DANGER GIFT 🚨</h1>

        <p>Don't click the button... 😈</p>

        <button onclick="activateAlarm()">
        Open Gift
    </button>

        <div id="warning">
            🚨 DANGER ALERT 🚨 <br> A special birthday gift has been delivered. <br> Did you get it? 🎁😈
        </div>

    </div>

    <script>
        function activateAlarm() {

            document.body.classList.add("shake");

            document.getElementById("warning").style.display = "block";

            let audio = new Audio(
                "https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"
            );

            audio.play();

            setTimeout(() => {
                document.body.classList.remove("shake");
            }, 5000);

        }
    </script>

</body>

</html>
