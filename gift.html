<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #ff0080, #7928ca, #2b32ff);
            position: relative;
            color: white;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
            animation: float 6s infinite ease-in-out alternate;
        }
        
        .circle1 {
            width: 250px;
            height: 250px;
            background: #ff66c4;
            top: -50px;
            left: -50px;
        }
        
        .circle2 {
            width: 300px;
            height: 300px;
            background: #6c63ff;
            bottom: -100px;
            right: -80px;
            animation-delay: 2s;
        }
        
        @keyframes float {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(30px);
            }
        }
        
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }
        
        .teddy {
            width: 180px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .login-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 35px;
        }
        
        .login-box input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            outline: none;
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .login-box input::placeholder {
            color: #eee;
        }
        
        #loginBtn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #7928ca;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        #loginBtn:hover {
            transform: scale(1.05);
            background: #ffe082;
        }
        
        .message {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #ffe082;
            font-weight: 500;
        }
        
        @media(max-width:768px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 30px 20px;
            }
            .teddy {
                width: 140px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-circle circle1"></div>

    <div class="bg-circle circle2"></div>

    <div class="container">
        <!--
        <img src="https://media.tenor.com/dg7Th23TzFUAAAAi/teddy-bear-love.gif" class="teddy">

        <h1>🎂 Birthday Login 🎁</h1>

        <p class="subtitle">
            Enter your name to continue
        </p>

        <div class="login-box">

            <input type="text" placeholder="Enter your name" id="nameInput">

            <button id="loginBtn">
            Open Gift 🎀
        </button>

        </div>

        <div class="message" id="message"></div>

    </div>
-->
    <script>
        const loginBtn =
            document.getElementById("loginBtn");

        const message =
            document.getElementById("message");

        // CORRECT NAME
        const correctName = "kesari";

        // TOTAL ATTEMPTS
        let attempts = 7;

        // ARRAY ERROR MESSAGES
        const errorMessages = [

            "I think so you put keshini its wrong",

            "just use your brain Motta you can !!",

            "Now you tried Motta correct 😅",

            "Another nic name having think Mental",

            " I think you not try Mental",

            "It may be an Sweet name Think",

            "Sweet pa It may be in Orange colour"

        ];

        // ARRAY INDEX
        let messageIndex = 0;

        loginBtn.addEventListener("click", () => {

            const name =
                document.getElementById("nameInput")
                .value
                .trim()
                .toLowerCase();

            // STOP AFTER 7 ATTEMPTS
            if (attempts <= 0) {

                message.innerHTML =
                    " Refresh and try Again";

                message.style.color = "red";

                return;

            }

            // EMPTY INPUT
            if (name === "") {

                message.innerHTML =
                    "⚠️ Please enter your name";

                message.style.color = "#ffcccb";

                return;

            }

            // CORRECT NAME
            if (name === correctName) {

                message.innerHTML =
                    "🎉 Login successful";

                message.style.color =
                    "#90ee90";

                setTimeout(() => {

                    window.location.href =
                        "warn.html";

                }, 1000);

            }

            // WRONG NAME
            else {

                // ARRAY MESSAGE IN ORDER
                let currentMessage =
                    errorMessages[messageIndex];

                message.innerHTML =
                    currentMessage;

                message.style.color =
                    "#ff4d6d";

                attempts--;

                // NEXT ARRAY MESSAGE
                messageIndex++;

                // STOP AT LAST ARRAY VALUE
                if (messageIndex >=
                    errorMessages.length) {

                    messageIndex =
                        errorMessages.length - 1;

                }

                // SHOW ATTEMPTS
                message.innerHTML +=
                    `<br>Attempts Left : ${attempts}`;

                // BLOCK LOGIN AFTER 7
                if (attempts === 0) {

                    loginBtn.disabled = true;

                    loginBtn.style.opacity =
                        "0.5";

                    message.innerHTML =
                        "💀 Too many wrong attempts";

                }

            }

        });
    </script>

</body>

</html>
