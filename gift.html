<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nickname Question</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient( 135deg, #ff9ec4, #c084fc, #7c3aed);
            font-family: 'Poppins', sans-serif;
        }
        /* FLOATING HEARTS */
        
        body::before,
        body::after {
            content: "💖";
            position: absolute;
            font-size: 3rem;
            animation: float 6s infinite linear;
        }
        
        body::after {
            left: 80%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            from {
                transform: translateY(100vh);
            }
            to {
                transform: translateY(-120vh);
            }
        }
        /* MAIN CARD */
        
        .card {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            border-radius: 35px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            animation: pop 1s ease;
        }
        /* POP EFFECT */
        
        @keyframes pop {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        /* DOLL */
        
        .doll {
            width: 180px;
            margin-bottom: 20px;
            animation: floatDoll 3s infinite ease-in-out;
        }
        
        @keyframes floatDoll {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        /* TITLE */
        
        h1 {
            color: white;
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        /* QUESTION */
        
        .question {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        /* INPUT */
        
        input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            outline: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        
        input::placeholder {
            color: #eee;
        }
        /* BUTTON */
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #7928ca;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            background: #ffe082;
        }
        /* RESULT */
        
        .result {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .doll {
                width: 140px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- DOLL -->

        <img src="https://media.tenor.com/dg7Th23TzFUAAAAi/teddy-bear-love.gif" class="doll">

        <!-- TITLE -->

        <h1>
            Do You Know You was In My Heart 💖
        </h1>

        <!-- QUESTION -->

        <div class="question">

            You want ProfF then Enter The Cute Name

        </div>

        <!-- INPUT -->

        <input type="text" id="nickname" placeholder="Enter your nickname">

        <!-- BUTTON -->

        <button id="checkBtn">

        Submit 🎀

    </button>

        <!-- RESULT -->

        <div class="result" id="result"></div>

    </div>

    <script>
        const checkBtn =
            document.getElementById("checkBtn");

        const result =
            document.getElementById("result");

        // CORRECT NICKNAME
        const correctNickname = "papa";

        checkBtn.addEventListener("click", () => {

            const nickname =
                document.getElementById("nickname")
                .value
                .trim()
                .toLowerCase();

            // EMPTY INPUT

            if (nickname === "") {

                result.innerHTML =
                    "⚠️ Please enter your nickname";

                result.style.color =
                    "#ffcccb";
            }

            // WRONG NICKNAME
            else if (nickname !== correctNickname) {

                result.innerHTML =
                    "Its so simple even baby can Find";

                result.style.color =
                    "#ff4d6d";

            }

            // CORRECT NICKNAME
            else {

                result.innerHTML =
                    "💖 Cute we See now ✨";

                result.style.color =
                    "#90ee90";

                // GO TO NEXT PAGE

                setTimeout(() => {

                    window.location.href =
                        "warn.html";

                }, 1500);

            }

        });
    </script>

</body>

</html>
