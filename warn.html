<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Full Image Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            position: relative;
        }
        /* BLUR BACKGROUND */
        
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.5);
            transform: scale(1.1);
        }
        /* MAIN BIG CARD */
        
        .card {
            position: relative;
            z-index: 2;
            width: 95%;
            height: 90vh;
            border-radius: 35px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
        }
        /* FULL IMAGE WITHOUT CUT */
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 35px;
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            .card {
                width: 96%;
                height: 75vh;
            }
        }
    </style>
</head>

<body>

    <!-- SAME IMAGE BLUR BACKGROUND -->

    <div class="bg">

        <img src="WhatsApp Image 2026-05-11 at 8.40.38 PM.jpeg">

    </div>

    <!-- BIG IMAGE CARD -->

    <div class="card">

        <img src="WhatsApp Image 2026-05-11 at 8.40.38 PM.jpeg">

    </div>

</body>

</html>
